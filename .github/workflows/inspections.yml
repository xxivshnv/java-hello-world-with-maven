name: Continuous Inspection

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev, master]

jobs:
  inspection:
    name: Checkstyle Inspection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run Checkstyle
        run: mvn -B checkstyle:checkstyle

      - name: Display Checkstyle Report
        run: cat target/checkstyle-result.xml

      - name: Upload Inspection Report
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: target/checkstyle-result.xml
